<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1040" cy="120" r="220" fill="#6366f1" opacity="0.12"/>
  <circle cx="120" cy="540" r="180" fill="#22d3ee" opacity="0.10"/>

  <text x="90" y="270" font-family="'Segoe UI', Arial, sans-serif" font-size="88" font-weight="700" fill="#f8fafc">InterPoll</text>
  <rect x="92" y="300" width="360" height="8" rx="4" fill="url(#accent)"/>

  <text x="90" y="370" font-family="'Segoe UI', Arial, sans-serif" font-size="34" fill="#cbd5e1">Decentralized polls &amp; discussions.</text>
  <text x="90" y="415" font-family="'Segoe UI', Arial, sans-serif" font-size="34" fill="#cbd5e1">No single company controls your vote.</text>

  <g font-family="'Segoe UI', Arial, sans-serif" font-size="22" fill="#94a3b8">
    <circle cx="100" cy="480" r="5" fill="#22d3ee"/>
    <text x="118" y="488">Signed &amp; tamper-evident</text>

    <circle cx="380" cy="480" r="5" fill="#22d3ee"/>
    <text x="398" y="488">Peer-replicated</text>

    <circle cx="600" cy="480" r="5" fill="#22d3ee"/>
    <text x="618" y="488">No signup to vote</text>
  </g>
</svg>
