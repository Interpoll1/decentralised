name: Deploy to FTP

on:
  push:
    branches:
      - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Extract script tag from built index.html
        id: extract_script
        run: |
          SCRIPT_TAG=$(grep -oP '<script[^>]*>[^<]*</script>' dist/index.html | tail -1)
          echo "script_tag<<EOF" >> $GITHUB_OUTPUT
          echo "$SCRIPT_TAG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Deploy assets2 to FTP using curl
        run: |
          # Remove ftp:// prefix if present
          FTP_HOST_CLEAN="${{ secrets.FTP_HOST }}"
          FTP_HOST_CLEAN="${FTP_HOST_CLEAN#ftp://}"
          
          # Upload entire assets2 directory
          cd dist/assets2
          find . -type f | while read file; do
            echo "Uploading: $file"
            curl -T "$file" "ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${FTP_HOST_CLEAN}/domains/endless.sbs/public_html/assets2/${file#./}" --create-dirs -v
          done

      - name: Prepare index.html with new script tag
        run: |
          mkdir -p deploy_index
          # Get the SEO head from the built dist/index.html up to </head>
          sed '/<script/,$d' dist/index.html > deploy_index/index.html
          # Add the new script tag and closing tags
          echo "    ${{ steps.extract_script.outputs.script_tag }}" >> deploy_index/index.html
          echo "  </body>" >> deploy_index/index.html
          echo "</html>" >> deploy_index/index.html

      - name: Deploy index.html to FTP using curl
        run: |
          # Remove ftp:// prefix if present
          FTP_HOST_CLEAN="${{ secrets.FTP_HOST }}"
          FTP_HOST_CLEAN="${FTP_HOST_CLEAN#ftp://}"
          
          echo "Uploading index.html to ${FTP_HOST_CLEAN}"
          curl -T deploy_index/index.html "ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${FTP_HOST_CLEAN}/domains/endless.sbs/public_html/index.html" -v

      - name: Cleanup
        if: always()
        run: rm -rf deploy_index
