name: Deploy to FTP

on:
  push:
    branches:
      - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Extract script tag from built index.html
        id: extract_script
        run: |
          SCRIPT_TAG=$(grep -oP '<script[^>]*>[^<]*</script>' dist/index.html | tail -1)
          echo "script_tag<<EOF" >> $GITHUB_OUTPUT
          echo "$SCRIPT_TAG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Deploy assets2 to FTP
        uses: milanmk/actions-file-deployer@master
        with:
          remote-url: ${{ secrets.FTP_HOST }}/domains/endless.sbs/public_html/assets2/
          remote-user: ${{ secrets.FTP_USERNAME }}
          remote-password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/assets2/

      - name: Prepare index.html with new script tag
        run: |
          mkdir -p deploy_index
          # Get the SEO head from the built dist/index.html up to </head>
          sed '/<script/,$d' dist/index.html > deploy_index/index.html
          # Add the new script tag and closing tags
          echo "    ${{ steps.extract_script.outputs.script_tag }}" >> deploy_index/index.html
          echo "  </body>" >> deploy_index/index.html
          echo "</html>" >> deploy_index/index.html

      - name: Deploy index.html to FTP
        uses: milanmk/actions-file-deployer@master
        with:
          remote-url: ${{ secrets.FTP_HOST }}/domains/endless.sbs/public_html/
          remote-user: ${{ secrets.FTP_USERNAME }}
          remote-password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy_index/
