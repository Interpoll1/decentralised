name: Deploy to FTP

on:
  push:
    branches:
      - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Extract script tag from built index.html
        id: extract_script
        run: |
          # Extract the script tag from dist/index.html
          SCRIPT_TAG=$(grep -oP '<script[^>]*>[^<]*</script>' dist/index.html | tail -1)
          echo "script_tag<<EOF" >> $GITHUB_OUTPUT
          echo "$SCRIPT_TAG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Deploy assets2 to FTP
        uses: milanmk/actions-file-deployer@master
        with:
          remote-url: ${{ secrets.FTP_HOST }}/domains/endless.sbs/public_html/assets2/
          remote-user: ${{ secrets.FTP_USERNAME }}
          remote-password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/assets2/

      - name: Download current index.html and update script tag
        run: |
          # Install lftp
          sudo apt-get update && sudo apt-get install -y lftp
          
          # Remove ftp:// prefix if user added it
          FTP_HOST_CLEAN="${{ secrets.FTP_HOST }}"
          FTP_HOST_CLEAN="${FTP_HOST_CLEAN#ftp://}"
          
          # Download current index.html
          mkdir -p ftp_work
          lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" "$FTP_HOST_CLEAN" << 'LFTP_EOF'
          cd domains/endless.sbs/public_html
          get index.html -o ftp_work/index.html
          quit
          LFTP_EOF
          
          # Replace the script tag while preserving the rest
          HEAD_CONTENT=$(sed '/<script[^>]*>[^<]*<\/script>$/d' ftp_work/index.html)
          
          # Write new index.html with preserved head and new script tag
          echo "$HEAD_CONTENT" > ftp_work/index.html.new
          echo "    ${{ steps.extract_script.outputs.script_tag }}" >> ftp_work/index.html.new
          echo "  </body>" >> ftp_work/index.html.new
          echo "</html>" >> ftp_work/index.html.new
          
          # Upload updated index.html
          lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" "$FTP_HOST_CLEAN" << 'LFTP_EOF'
          cd domains/endless.sbs/public_html
          put ftp_work/index.html.new -o index.html
          quit
          LFTP_EOF

      - name: Cleanup
        if: always()
        run: rm -rf ftp_work
